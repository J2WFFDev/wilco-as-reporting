name: Fetch SASP Match

on:
  workflow_dispatch:
    inputs:
      match_id:
        description: SASP match ID to fetch
        required: true
        default: "664"
        type: string
      overwrite:
        description: Overwrite existing raw snapshot files
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  fetch-match:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Fetch raw match data
        env:
          MATCH_ID: ${{ inputs.match_id }}
          OVERWRITE: ${{ inputs.overwrite }}
          PYTHONPATH: src
        run: |
          overwrite_arg=""
          if [[ "$OVERWRITE" == "true" ]]; then
            overwrite_arg="--overwrite"
          fi

          python -m wilco_as_reporting.cli \
            --match-id "$MATCH_ID" \
            --output-dir "output/$MATCH_ID" \
            $overwrite_arg

      - name: Upload raw match data
        uses: actions/upload-artifact@v4
        with:
          name: raw-match-${{ inputs.match_id }}
          path: output/${{ inputs.match_id }}/raw
