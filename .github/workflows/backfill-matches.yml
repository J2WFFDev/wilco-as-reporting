name: Backfill Matches

on:
  workflow_dispatch:
    inputs:
      match_ids:
        description: Comma-separated SASP match IDs
        required: true
        default: "628,664"
        type: string
      team_key:
        description: Configured team profile key
        required: true
        default: "wilco"
        type: string
      build_level:
        description: Highest processing layer to build
        required: true
        default: "team"
        type: choice
        options:
          - raw
          - parse
          - validate
          - report
          - team
          - nationals
      max_matches:
        description: Maximum matches permitted in this run
        required: true
        default: "5"
        type: string
      dry_run:
        description: Plan only without fetching match data
        required: true
        default: true
        type: boolean
      include_schedule:
        description: Include schedule snapshots
        required: true
        default: true
        type: boolean
      overwrite:
        description: Refresh existing raw snapshots
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  backfill-matches:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Restore prior refresh state
        uses: actions/cache@v4
        with:
          path: output
          key: backfill-state-${{ inputs.team_key }}-${{ github.run_id }}
          restore-keys: |
            backfill-state-${{ inputs.team_key }}-
            incremental-state-${{ inputs.team_key }}-

      - name: Run guarded backfill
        env:
          MATCH_IDS: ${{ inputs.match_ids }}
          TEAM_KEY: ${{ inputs.team_key }}
          BUILD_LEVEL: ${{ inputs.build_level }}
          MAX_MATCHES: ${{ inputs.max_matches }}
          DRY_RUN: ${{ inputs.dry_run }}
          INCLUDE_SCHEDULE: ${{ inputs.include_schedule }}
          OVERWRITE: ${{ inputs.overwrite }}
          PYTHONPATH: src
        run: |
          dry_run_arg=""
          schedule_arg=""
          overwrite_arg=""

          if [[ "$DRY_RUN" == "true" ]]; then
            dry_run_arg="--dry-run"
          fi
          if [[ "$INCLUDE_SCHEDULE" == "true" ]]; then
            schedule_arg="--include-schedule"
          fi
          if [[ "$OVERWRITE" == "true" ]]; then
            overwrite_arg="--overwrite"
          fi

          python -m wilco_as_reporting.cli backfill \
            --match-ids "$MATCH_IDS" \
            --team-key "$TEAM_KEY" \
            --output-dir output \
            --build-level "$BUILD_LEVEL" \
            --max-matches "$MAX_MATCHES" \
            $dry_run_arg \
            $schedule_arg \
            $overwrite_arg

      - name: Upload backfill report
        uses: actions/upload-artifact@v4
        with:
          name: backfill-report
          path: output
          retention-days: 14
