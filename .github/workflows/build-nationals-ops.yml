name: Build Nationals Ops Report

on:
  workflow_dispatch:
    inputs:
      match_id:
        description: SASP match ID to refresh and compare
        required: true
        default: "671"
        type: string
      team_key:
        description: Configured team profile key
        required: true
        default: "wilco"
        type: string
      snapshot_label:
        description: Snapshot label such as morning, midday, or final
        required: true
        default: "manual"
        type: string
      overwrite:
        description: Overwrite current raw snapshot files
        required: true
        default: true
        type: boolean
      include_schedule:
        description: Fetch the match schedule snapshot
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  build-nationals-ops:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Restore prior Nationals comparison state
        uses: actions/cache@v4
        with:
          path: |
            output/${{ inputs.match_id }}/snapshots
            output/state
          key: nationals-state-${{ inputs.match_id }}-${{ inputs.team_key }}-${{ github.run_id }}
          restore-keys: |
            nationals-state-${{ inputs.match_id }}-${{ inputs.team_key }}-

      - name: Build Nationals operations report
        env:
          MATCH_ID: ${{ inputs.match_id }}
          TEAM_KEY: ${{ inputs.team_key }}
          SNAPSHOT_LABEL: ${{ inputs.snapshot_label }}
          OVERWRITE: ${{ inputs.overwrite }}
          INCLUDE_SCHEDULE: ${{ inputs.include_schedule }}
          PYTHONPATH: src
        run: |
          overwrite_arg=""
          schedule_arg=""

          if [[ "$OVERWRITE" == "true" ]]; then
            overwrite_arg="--overwrite"
          fi
          if [[ "$INCLUDE_SCHEDULE" == "true" ]]; then
            schedule_arg="--include-schedule"
          fi

          python -m wilco_as_reporting.cli build-nationals \
            --match-id "$MATCH_ID" \
            --output-dir "output/$MATCH_ID" \
            --team-key "$TEAM_KEY" \
            --snapshot-label "$SNAPSHOT_LABEL" \
            $overwrite_arg \
            $schedule_arg

      - name: Upload Nationals operations artifact
        uses: actions/upload-artifact@v4
        with:
          name: nationals-${{ inputs.match_id }}-${{ inputs.team_key }}-ops
          path: |
            output/${{ inputs.match_id }}
            output/state/match_refresh_manifest.csv
          retention-days: 14
