name: Discover SASP Matches

on:
  workflow_dispatch:
    inputs:
      overwrite:
        description: Overwrite existing raw discovery snapshots
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  discover-matches:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Discover matches
        env:
          OVERWRITE: ${{ inputs.overwrite }}
          PYTHONPATH: src
        run: |
          overwrite_arg=""
          if [[ "$OVERWRITE" == "true" ]]; then
            overwrite_arg="--overwrite"
          fi

          python -m wilco_as_reporting.cli discover \
            --output-dir output/discovery \
            $overwrite_arg

      - name: Upload match discovery
        uses: actions/upload-artifact@v4
        with:
          name: match-discovery
          path: output/discovery
