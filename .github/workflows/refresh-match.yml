name: Refresh SASP Match

on:
  workflow_dispatch:
    inputs:
      match_id:
        description: SASP match ID to refresh
        required: true
        default: "671"
        type: string
      overwrite:
        description: Overwrite existing raw snapshot files
        required: true
        default: true
        type: boolean
      include_schedule:
        description: Fetch the match schedule snapshot
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  refresh-match:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Refresh raw match data
        env:
          MATCH_ID: ${{ inputs.match_id }}
          OVERWRITE: ${{ inputs.overwrite }}
          INCLUDE_SCHEDULE: ${{ inputs.include_schedule }}
          PYTHONPATH: src
        run: |
          overwrite_arg=""
          schedule_arg=""

          if [[ "$OVERWRITE" == "true" ]]; then
            overwrite_arg="--overwrite"
          fi
          if [[ "$INCLUDE_SCHEDULE" == "true" ]]; then
            schedule_arg="--include-schedule"
          fi

          python -m wilco_as_reporting.cli fetch \
            --match-id "$MATCH_ID" \
            --output-dir "output/$MATCH_ID" \
            $overwrite_arg \
            $schedule_arg

      - name: Upload refreshed match data
        uses: actions/upload-artifact@v4
        with:
          name: match-${{ inputs.match_id }}-refresh
          path: output/${{ inputs.match_id }}/raw
